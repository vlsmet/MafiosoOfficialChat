<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Роли - Mafioso Official</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #1e1e2f; /* темно-синий фон */
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
    }

    h1 {
      font-size: 60px;
      margin-bottom: 60px;
      color: #f1c40f; /* желтый для заголовка */
    }

    .role-button {
      display: block;
      width: 500px;
      margin: 30px auto;
      padding: 40px;
      font-size: 36px;
      background-color: #2c2c54; /* чуть светлее фона */
      border: none;
      border-radius: 20px;
      cursor: pointer;
      color: #fff;
      transition: transform 0.2s, background-color 0.2s;
      text-decoration: none;
    }

    .role-button:hover {
      transform: scale(1.05);
      background-color: #3a3a70;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🌟 Выберите фракцию</h1>

    <a href="peace.html" class="role-button">🌿 Мирная фракция</a>
    <a href="mafia.html" class="role-button">🕶 Фракция Мафии</a>
    <a href="neutral.html" class="role-button">⚖️ Фракция нейтралов</a>
  </div>
</body>
</html>
